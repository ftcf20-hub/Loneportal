<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title> Rules & Loan Application</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Noto+Nastaliq+Urdu&display=swap');
    body { font-family: 'Poppins', sans-serif; background-color: #f8fafc; }
    .urdu-text { font-family: 'Noto Nastaliq Urdu', serif; }
  </style>
</head>
<body class="pb-10">

  <main class="max-w-md mx-auto p-4 space-y-6">
    <!-- Header -->
    <div class="flex justify-between items-center py-4">
        <h1 class="font-bold text-2xl text-gray-800 tracking-tight">Portal</h1>
        <div class="w-10 h-10 bg-emerald-600 rounded-full flex items-center justify-center text-white font-bold shadow-md">F</div>
    </div>

    <!-- Stats -->
    <div class="grid grid-cols-3 gap-3">
        <div class="col-span-3 bg-gradient-to-br from-emerald-800 to-emerald-950 p-6 rounded-3xl text-white shadow-lg text-center">
            <p class="text-emerald-300 text-xs uppercase tracking-widest mb-1">Active Loans</p>
            <h2 class="font-bold text-3xl">0</h2>
        </div>
        <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
            <p class="text-[10px] text-gray-400 uppercase">Inflow</p>
            <p class="font-bold text-emerald-600 text-sm">Rs. 11,500</p>
        </div>
        <div class="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm text-center">
            <p class="text-[10px] text-gray-400 uppercase">Outflow</p>
            <p class="font-bold text-red-500 text-sm">Rs. 0</p>
        </div>
    </div>

    <!-- Loan List -->
    <div class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
        <h3 class="font-bold text-gray-800 mb-4 flex items-center gap-2"><i class="fas fa-list text-emerald-700"></i> Loan Takers</h3>
        <div id="loan-list" class="space-y-3 text-sm text-gray-600">
             <div class="flex justify-between items-center border-b pb-2"><span>-</span><span class="font-semibold text-gray-800">Rs. 0</span><span class="text-green-500 bg-green-50 px-2 py-0.5 rounded-full text-[10px] font-bold">PAID</span></div>
        </div>
    </div>

    <!-- Loan Application Form -->
    <div class="bg-white p-6 rounded-3xl shadow-lg border border-gray-100">
        <h3 class="font-bold text-gray-800 mb-4 text-center">Request New Loan</h3>
        <form id="loanForm" class="space-y-3">
            <input type="text" id="n" placeholder="Name" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
            <input type="number" id="a" placeholder="Amount" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" required>
            <textarea id="r" placeholder="Reason" class="w-full p-3 rounded-xl bg-gray-50 border border-gray-200 focus:ring-2 focus:ring-emerald-500 outline-none transition" rows="3" required></textarea>
            <button type="button" onclick="send()" class="w-full bg-emerald-900 hover:bg-emerald-800 text-white p-4 rounded-xl font-bold transition shadow-md">Submit Request</button>
        </form>
    </div>
  </main>

  <script>
    function send() {
      const n = document.getElementById('n').value;
      const a = document.getElementById('a').value;
      const r = document.getElementById('r').value;
      const date = new Date().toLocaleDateString();

      // Validation
      if (!n || !a || !r) {
        alert("Please fill in all fields.");
        return;
      }

      const msg = `New Loan Application:%0ADate: ${date}%0AName: ${n}%0AAmount: ${a}%0AReason: ${r}`;
      window.open(`https://wa.me/923433052346?text=${msg}`, '_blank');
    }
  </script>
</body>
</html>
